openapi: '3.0.1'
info:
  title: Flink JobManager REST API
  contact:
    name: Kin Lane
    email: kinlane@naftiko
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: v1/2.1-SNAPSHOT
servers:
- url: https://api.example.com/v1
  description: sandbox
tags:
- name: BackPressure
  description: Operations related to vertex back pressure information.
- name: Checkpoints
  description: Operations related to job checkpoints.
- name: Cluster
  description: Operations related to the Flink cluster lifecycle.
- name: ClusterOverview
  description: Operations related to the cluster overview.
- name: Configuration
  description: Operations related to the WebUI dashboard configuration.
- name: Datasets
  description: Operations related to cluster data sets.
- name: FlameGraphs
  description: Operations related to vertex flame graphs.
- name: Jars
  description: Operations related to jar file management.
- name: JobAccumulators
  description: Operations related to job accumulators.
- name: JobConfiguration
  description: Operations related to job configuration.
- name: JobExceptions
  description: Operations related to job exceptions.
- name: JobExecutionResults
  description: Operations related to job execution results.
- name: JobLifecycle
  description: Operations related to job lifecycle management.
- name: JobManager
  description: Operations related to the JobManager.
- name: JobManagerEnvironment
  description: Operations related to the JobManager environment for specific jobs.
- name: JobManagerLogs
  description: Operations related to JobManager log URLs.
- name: JobManagerOperatorMetrics
  description: Operations related to JobManager operator metrics.
- name: JobMetrics
  description: Operations related to job metrics.
- name: JobPlans
  description: Operations related to job dataflow plans.
- name: JobRescaling
  description: Operations related to job rescaling.
- name: JobResourceRequirements
  description: Operations related to job resource requirements.
- name: JobStatus
  description: Operations related to job status.
- name: JobTaskManagers
  description: Operations related to task managers for specific jobs.
- name: JobVertexAccumulators
  description: Operations related to job vertex accumulators.
- name: JobVertexMetrics
  description: Operations related to job vertex metrics.
- name: JobVertexTaskManagers
  description: Operations related to job vertex task manager aggregation.
- name: JobVertices
  description: Operations related to job vertices (tasks).
- name: Jobs
  description: Operations related to Flink jobs.
- name: SavepointDisposal
  description: Operations related to savepoint disposal.
- name: Savepoints
  description: Operations related to job savepoints.
- name: Subtasks
  description: Operations related to job subtasks.
- name: TaskManagerLogs
  description: Operations related to task manager logs.
- name: TaskManagerMetrics
  description: Operations related to task manager metrics.
- name: TaskManagerThreadDumps
  description: Operations related to task manager thread dumps.
- name: TaskManagers
  description: Operations related to task managers.
- name: Watermarks
  description: Operations related to vertex watermarks.
paths:
  /cluster:
    delete:
      description: Shuts down the cluster
      operationId: shutdownCluster
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                type: object
              examples:
                Default:
                  value: {}
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                BadRequestError:
                  value:
                    errors:
                    - Invalid request parameters.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              examples:
                InternalServerError:
                  value:
                    errors:
                    - An internal server error occurred.
      tags:
      - Cluster
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |-
          def dispatcher = "Default"
          return dispatcher
  /config:
    get:
      description: Returns the configuration of the WebUI.
      operationId: getDashboardConfiguration
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardConfiguration'
              examples:
                Default:
                  value:
                    features:
                      web-cancel: true
                      web-history: true
                      web-rescale: true
                      web-submit: true
                    flink-revision: example-string
                    flink-version: example-string
                    refresh-interval: 1
                    timezone-name: example-string
                    timezone-offset: 1
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                BadRequestError:
                  value:
                    errors:
                    - Invalid request parameters.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              examples:
                InternalServerError:
                  value:
                    errors:
                    - An internal server error occurred.
      tags:
      - Configuration
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |-
          def dispatcher = "Default"
          return dispatcher
  /datasets:
    get:
      description: Returns all cluster data sets.
      operationId: getClusterDataSetList
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterDataSetListResponseBody'
              examples:
                Default:
                  value:
                    dataSets:
                    - id: example-string
                      isComplete: true
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                BadRequestError:
                  value:
                    errors:
                    - Invalid request parameters.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              examples:
                InternalServerError:
                  value:
                    errors:
                    - An internal server error occurred.
      tags:
      - Datasets
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |-
          def dispatcher = "Default"
          return dispatcher
  /datasets/delete/{triggerid}:
    get:
      description: Returns the status for the delete operation of a cluster data set.
      operationId: getClusterDataSetDeleteStatus
      parameters:
      - name: triggerid
        in: path
        description: '32-character hexadecimal string that identifies an asynchronous operation trigger ID. The ID was returned
          then the operation was triggered.'
        required: true
        schema:
          $ref: '#/components/schemas/TriggerId'
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsynchronousOperationResult'
              examples:
                Default:
                  value:
                    operation:
                      failure-cause:
                        serialized-throwable: base64encodeddata==
                    status:
                      id: IN_PROGRESS
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                BadRequestError:
                  value:
                    errors:
                    - Invalid request parameters.
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
              examples:
                NotFoundError:
                  value:
                    errors:
                    - The requested resource was not found.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              examples:
                InternalServerError:
                  value:
                    errors:
                    - An internal server error occurred.
      tags:
      - Datasets
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |-
          def dispatcher = "Default"
          return dispatcher
  /datasets/{datasetid}:
    delete:
      description: Triggers the deletion of a cluster data set. This async operation would return a 'triggerid' for further
        query identifier.
      operationId: deleteClusterDataSet
      parameters:
      - name: datasetid
        in: path
        description: '32-character hexadecimal string value that identifies a cluster data set.'
        required: true
        schema:
          $ref: '#/components/schemas/IntermediateDataSetID'
      responses:
        '202':
          description: The request was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerResponse'
              examples:
                Default:
                  value:
                    request-id: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                BadRequestError:
                  value:
                    errors:
                    - Invalid request parameters.
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
              examples:
                NotFoundError:
                  value:
                    errors:
                    - The requested resource was not found.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              examples:
                InternalServerError:
                  value:
                    errors:
                    - An internal server error occurred.
      tags:
      - Datasets
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |-
          def dispatcher = "Default"
          return dispatcher
  /jars:
    get:
      description: Returns a list of all jars previously uploaded via '/jars/upload'.
      operationId: getJarList
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JarListInfo'
              examples:
                Default:
                  value:
                    address: example-string
                    files:
                    - entry:
                      - description: example-string
                        name: example-string
                      id: example-string
                      name: example-string
                      uploaded: 1
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                BadRequestError:
                  value:
                    errors:
                    - Invalid request parameters.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              examples:
                InternalServerError:
                  value:
                    errors:
                    - An internal server error occurred.
      tags:
      - Jars
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |-
          def dispatcher = "Default"
          return dispatcher
  /jars/upload:
    post:
      description: |-
        Uploads a jar to the cluster. The jar must be sent as multi-part data. Make sure that the "Content-Type" header is set to "application/x-java-archive", as some http libraries do not add the header by default.
        Using 'curl' you can upload a jar via 'curl -X POST -H "Expect:" -F "jarfile=@path/to/flink-job.jar" http://hostname:port/jars/upload'.
      operationId: uploadJar
      requestBody:
        content:
          application/x-java-archive:
            schema:
              type: string
              format: binary
        required: true
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JarUploadResponseBody'
              examples:
                Default:
                  value:
                    filename: example-string
                    status: success
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                BadRequestError:
                  value:
                    errors:
                    - Invalid request parameters.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              examples:
                InternalServerError:
                  value:
                    errors:
                    - An internal server error occurred.
      tags:
      - Jars
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |-
          def dispatcher = "Default"
          return dispatcher
  /jars/{jarid}:
    delete:
      description: Deletes a jar previously uploaded via '/jars/upload'.
      operationId: deleteJar
      parameters:
      - name: jarid
        in: path
        description: String value that identifies a jar. When uploading the jar a path is returned, where the filename is
          the ID. This value is equivalent to the `id` field in the list of uploaded jars (/jars).
        required: true
        schema:
          type: string
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                type: object
              examples:
                Default:
                  value: {}
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                BadRequestError:
                  value:
                    errors:
                    - Invalid request parameters.
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
              examples:
                NotFoundError:
                  value:
                    errors:
                    - The requested resource was not found.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              examples:
                InternalServerError:
                  value:
                    errors:
                    - An internal server error occurred.
      tags:
      - Jars
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |-
          def dispatcher = "Default"
          return dispatcher
  /jars/{jarid}/plan:
    post:
      description: Returns the dataflow plan of a job contained in a jar previously uploaded via '/jars/upload'. Program arguments
        can be passed both via the JSON request (recommended) or query parameters.
      operationId: generatePlanFromJar
      parameters:
      - name: jarid
        in: path
        description: String value that identifies a jar. When uploading the jar a path is returned, where the filename is
          the ID. This value is equivalent to the `id` field in the list of uploaded jars (/jars).
        required: true
        schema:
          type: string
      - name: programArg
        in: query
        description: Comma-separated list of program arguments.
        required: false
        style: form
        schema:
          type: string
      - name: entry-class
        in: query
        description: String value that specifies the fully qualified name of the entry point class. Overrides the class defined
          in the jar file manifest.
        required: false
        style: form
        schema:
          type: string
      - name: parallelism
        in: query
        description: Positive integer value that specifies the desired parallelism for the job.
        required: false
        style: form
        schema:
          type: integer
          format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JarPlanRequestBody'
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobPlanInfo'
              examples:
                Default:
                  value:
                    plan:
                      jid: example-string
                      name: example-string
                      nodes:
                      - description: example-string
                        id: example-string
                        inputs:
                        - caching: {}
                          exchange: {}
                          id: {}
                          local_strategy: {}
                          num: {}
                          ship_strategy: {}
                        operator: example-string
                        operator_strategy: example-string
                        optimizer_properties: {}
                        parallelism: 1
                      type: example-string
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                BadRequestError:
                  value:
                    errors:
                    - Invalid request parameters.
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
              examples:
                NotFoundError:
                  value:
                    errors:
                    - The requested resource was not found.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              examples:
                InternalServerError:
                  value:
                    errors:
                    - An internal server error occurred.
      tags:
      - Jars
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |-
          def dispatcher = "Default"
          return dispatcher
  /jars/{jarid}/run:
    post:
      description: Submits a job by running a jar previously uploaded via '/jars/upload'. Program arguments can be passed
        both via the JSON request (recommended) or query parameters.
      operationId: submitJobFromJar
      parameters:
      - name: jarid
        in: path
        description: String value that identifies a jar. When uploading the jar a path is returned, where the filename is
          the ID. This value is equivalent to the `id` field in the list of uploaded jars (/jars).
        required: true
        schema:
          type: string
      - name: allowNonRestoredState
        in: query
        description: Boolean value that specifies whether the job submission should be rejected if the savepoint contains
          state that cannot be mapped back to the job.
        required: false
        style: form
        schema:
          type: boolean
      - name: savepointPath
        in: query
        description: String value that specifies the path of the savepoint to restore the job from.
        required: false
        style: form
        schema:
          type: string
      - name: programArg
        in: query
        description: Comma-separated list of program arguments.
        required: false
        style: form
        schema:
          type: string
      - name: entry-class
        in: query
        description: String value that specifies the fully qualified name of the entry point class. Overrides the class defined
          in the jar file manifest.
        required: false
        style: form
        schema:
          type: string
      - name: parallelism
        in: query
        description: Positive integer value that specifies the desired parallelism for the job.
        required: false
        style: form
        schema:
          type: integer
          format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JarRunRequestBody'
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JarRunResponseBody'
              examples:
                Default:
                  value:
                    jobid: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                BadRequestError:
                  value:
                    errors:
                    - Invalid request parameters.
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
              examples:
                NotFoundError:
                  value:
                    errors:
                    - The requested resource was not found.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              examples:
                InternalServerError:
                  value:
                    errors:
                    - An internal server error occurred.
      tags:
      - Jars
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |-
          def dispatcher = "Default"
          return dispatcher
  /jobmanager/config:
    get:
      description: Returns the cluster configuration.
      operationId: getClusterConfigurationInfo
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConfigurationInfoEntry'
              examples:
                Default:
                  value:
                  - key: example-string
                    value: example-string
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                BadRequestError:
                  value:
                    errors:
                    - Invalid request parameters.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              examples:
                InternalServerError:
                  value:
                    errors:
                    - An internal server error occurred.
      tags:
      - JobManager
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |-
          def dispatcher = "Default"
          return dispatcher
  /jobmanager/environment:
    get:
      description: Returns the jobmanager environment.
      operationId: getJobManagerEnvironment
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentInfo'
              examples:
                Default:
                  value:
                    classpath:
                    - example-string
                    jvm:
                      arch: example-string
                      options:
                      - example-string
                      version: example-string
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                BadRequestError:
                  value:
                    errors:
                    - Invalid request parameters.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              examples:
                InternalServerError:
                  value:
                    errors:
                    - An internal server error occurred.
      tags:
      - JobManager
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |-
          def dispatcher = "Default"
          return dispatcher
  /jobmanager/logs:
    get:
      description: Returns the list of log files on the JobManager.
      operationId: getJobManagerLogList
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogListInfo'
              examples:
                Default:
                  value:
                    logs:
                    - mtime: 1
                      name: example-string
                      size: 1
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                BadRequestError:
                  value:
                    errors:
                    - Invalid request parameters.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              examples:
                InternalServerError:
                  value:
                    errors:
                    - An internal server error occurred.
      tags:
      - JobManager
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |-
          def dispatcher = "Default"
          return dispatcher
  /jobmanager/metrics:
    get:
      description: Provides access to job manager metrics.
      operationId: getJobManagerMetrics
      parameters:
      - name: get
        in: query
        description: Comma-separated list of string values to select specific metrics.
        required: false
        style: form
        schema:
          type: string
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricCollectionResponseBody'
              examples:
                Default:
                  value:
                    metrics:
                    - id: example-string
                      value: example-string
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                BadRequestError:
                  value:
                    errors:
                    - Invalid request parameters.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              examples:
                InternalServerError:
                  value:
                    errors:
                    - An internal server error occurred.
      tags:
      - JobManager
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |-
          def dispatcher = "Default"
          return dispatcher
  /jobmanager/thread-dump:
    get:
      description: Returns the thread dump of the JobManager.
      operationId: getJobManagerThreadDump
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadDumpInfo'
              examples:
                Default:
                  value:
                    threadInfos:
                    - stringifiedThreadInfo: example-string
                      threadName: example-string
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                BadRequestError:
                  value:
                    errors:
                    - Invalid request parameters.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              examples:
                InternalServerError:
                  value:
                    errors:
                    - An internal server error occurred.
      tags:
      - JobManager
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |-
          def dispatcher = "Default"
          return dispatcher
  /jobs:
    get:
      description: Returns an overview over all jobs and their current state.
      operationId: getJobIdsWithStatusesOverview
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobIdsWithStatusOverview'
              examples:
                Default:
                  value:
                    jobs:
                    - id: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6
                      status: INITIALIZING
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                BadRequestError:
                  value:
                    errors:
