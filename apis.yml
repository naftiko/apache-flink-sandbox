specificationVersion: '0.19'

aid: apache-flink-sandbox
type: Sandbox
visibility: Public

name: Apache Flink JobManager REST API Sandbox
description: >-
  This is an Apache Flink sandbox that uses OpenAPI, Microcks, Bruno, and
  Backstage to provide a 3rd-party REST API and MCP sandbox for Apache Flink.

tags:
  - Stream Processing
  - Data Processing
  - Jobs

image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png

created: '2026-02-26'
modified: '2026-02-26'

url: https://github.com/naftiko/apache-flink-sandbox/blob/main/README.md

apis:

    - aid: apache-flink:jobmanager-rest-api
      name: Flink JobManager REST API
      description: >-
        The Flink JobManager REST API provides programmatic access to manage and
        monitor Apache Flink clusters, jobs, task managers, checkpoints,
        savepoints, jars, metrics, and more.
      humanURL: https://github.com/naftiko/apache-flink-sandbox
      baseURL: http://localhost:8080/rest/apache-flink-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
      tags:
        - Jobs
        - Clusters
        - Task Managers
        - Checkpoints
        - Savepoints
        - Jars
        - Metrics
      properties:

        - type: OpenAPI
          url: openapi/apache-flink-openapi.yaml
        - type: MockRestServer
          url: http://localhost:8080/rest/apache-flink-api/1.0.0
        - type: MockMCPServer
          url: http://localhost:8080/rest/apache-flink-api/1.0.0/sse
        - type: BackstageApi
          url: backstage/apache-flink-api-sandbox-backstage.yml

